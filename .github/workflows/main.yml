name: Video Pipeline (Rough)

on:
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6-hour limit for large files

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Script
        env:
          DIRECT_DOWNLOAD_URL: ${{ secrets.SEEDR_DIRECT_LINK }}
        # -u ensures real-time logs in the GitHub console
        run: python -u rough.py

      - name: Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: hls-stream-chunks
          path: stream_output/
