name: Video Timing Pipeline

on:
  workflow_dispatch:

jobs:
  measure-speed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Dependencies
        run: pip install requests

      - name: Run Speed Test
        env:
          DIRECT_DOWNLOAD_URL: ${{ secrets.SEEDR_DIRECT_LINK }}
        # -u ensures the 5%... 20%... prints show up live
        run: python -u rough.py
